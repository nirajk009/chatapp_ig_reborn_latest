    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse - Contacts</title>
    <meta name="description" content="Your contacts on Pulse - See who's online and connect instantly." />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        /* ========================================
           DESIGN SYSTEM: VELVET PULSE – CONTACTS
           ======================================== */
        :root {
            --primary: #952cb1;
            --primary-dim: #871ba4;
            --primary-container: #f1a6ff;
            --on-primary: #fff7fb;
            --on-primary-container: #680082;
            --secondary: #8c3e9b;
            --secondary-container: #fed6ff;
            --on-secondary-container: #7d308d;
            --surface: #fff7fb;
            --surface-container-low: #ffeffc;
            --surface-container-high: #fedeff;
            --surface-container-highest: #fdd6ff;
            --on-surface: #45274b;
            --on-surface-variant: #75547a;
            --outline: #926f97;
            --outline-variant: #cca5d0;
            --green: #4ade80;
            --font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius-full: 9999px;
            --radius-lg: 2rem;
            --radius-md: 1rem;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--surface);
            color: var(--on-surface);
            min-height: 100dvh;
            overflow-x: hidden;
        }

        ::selection {
            background: var(--primary-container);
            color: var(--on-primary-container);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* --- Top App Bar --- */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
            height: 4rem;
            background: rgba(255, 247, 251, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 1px 12px rgba(69, 39, 75, 0.05);
        }

        .topbar__left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .topbar__avatar {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--primary-container);
        }

        .topbar__avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .topbar__title {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            color: var(--primary);
        }

        .topbar__search-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .topbar__search-btn:hover {
            background: var(--surface-container-high);
        }

        .topbar__search-btn:active {
            transform: scale(0.92);
        }

        /* --- Main Content --- */
        .main-content {
            padding: 5.5rem 1.5rem 8rem;
            max-width: 640px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- Search Bar --- */
        .search-bar {
            position: relative;
            margin-bottom: 2.5rem;
        }

        .search-bar__icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(117, 84, 122, 0.6);
            font-size: 1.25rem;
            pointer-events: none;
        }

        .search-bar__input {
            width: 100%;
            background: var(--surface-container-low);
            border: none;
            border-radius: var(--radius-full);
            padding: 1rem 1.5rem 1rem 3.5rem;
            font-family: var(--font-family);
            font-size: 0.95rem;
            color: var(--on-surface);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-bar__input::placeholder {
            color: rgba(117, 84, 122, 0.4);
        }

        .search-bar__input:focus {
            box-shadow: 0 0 0 3px rgba(149, 44, 177, 0.12);
            background: var(--surface);
        }

        /* --- Section Title --- */
        .section-title {
            font-size: 0.6875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--on-surface-variant);
            padding-left: 0.5rem;
            margin-bottom: 1.5rem;
        }

        /* --- Online Now Grid --- */
        .online-section {
            margin-bottom: 3rem;
        }

        .online-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Featured Card (Elena Rose) */
        .featured-card {
            background: var(--surface-container-high);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            aspect-ratio: 1;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .featured-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(69, 39, 75, 0.08);
        }

        .featured-card:active {
            transform: scale(0.98);
        }

        .featured-card__status {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 0.75rem;
            height: 0.75rem;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 0 3px var(--surface-container-high);
        }

        .featured-card__avatar {
            width: 5rem;
            height: 5rem;
            border-radius: var(--radius-md);
            object-fit: cover;
            margin-bottom: 1rem;
        }

        .featured-card__name {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--on-surface);
            line-height: 1.2;
        }

        .featured-card__meta {
            font-size: 0.8rem;
            color: var(--on-surface-variant);
            margin-top: 0.25rem;
        }

        /* Small online cards (right column) */
        .online-stack {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 1rem;
        }

        .small-card {
            background: var(--secondary-container);
            border-radius: var(--radius-md);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .small-card:nth-child(2) {
            background: var(--surface-container-low);
        }

        .small-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(69, 39, 75, 0.06);
        }

        .small-card:active {
            transform: scale(0.97);
        }

        .small-card__avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .small-card__avatar {
            width: 3rem;
            height: 3rem;
            border-radius: var(--radius-md);
            object-fit: cover;
        }

        .small-card__status {
            position: absolute;
            bottom: -3px;
            right: -3px;
            width: 0.75rem;
            height: 0.75rem;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 0 2px var(--secondary-container);
        }

        .small-card:nth-child(2) .small-card__status {
            box-shadow: 0 0 0 2px var(--surface-container-low);
        }

        .small-card__name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--on-surface);
        }

        .small-card:first-child .small-card__name {
            color: var(--on-secondary-container);
        }

        /* --- Recent Interactions --- */
        .recent-section {
            margin-top: 0;
        }

        .contacts-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            text-decoration: none;
            color: inherit;
        }

        .contact-item:hover {
            background: var(--surface-container-low);
        }

        .contact-item:active {
            transform: scale(0.99);
        }

        .contact-item__left {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .contact-item__avatar {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--surface-container-highest);
            flex-shrink: 0;
        }

        .contact-item__avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .contact-item__avatar--initials {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .contact-item__info {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .contact-item__name {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--on-surface);
            line-height: 1.2;
        }

        .contact-item__email {
            font-size: 0.85rem;
            color: var(--on-surface-variant);
        }

        .contact-item__right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.35rem;
        }

        .contact-item__status-label {
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .contact-item__status-label--online {
            color: var(--primary);
        }

        .contact-item__status-label--away {
            color: var(--on-surface-variant);
        }

        .contact-item__status-label--offline {
            color: rgba(117, 84, 122, 0.4);
        }

        .contact-item__dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
        }

        .contact-item__dot--online {
            background: var(--green);
        }

        .contact-item__dot--away {
            background: rgba(204, 165, 208, 0.4);
        }

        .contact-item__dot--offline {
            background: rgba(204, 165, 208, 0.2);
        }

        /* --- FAB --- */
        .fab {
            position: fixed;
            bottom: 6.5rem;
            right: 1.5rem;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dim));
            color: var(--on-primary);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(149, 44, 177, 0.25);
            z-index: 40;
            transition: all 0.3s ease;
        }

        .fab:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 32px rgba(149, 44, 177, 0.35);
        }

        .fab:active {
            transform: scale(0.92);
        }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0.5rem 2rem 1.5rem;
            background: var(--surface);
            border-radius: 2.5rem 2.5rem 0 0;
            box-shadow: 0 -4px 20px rgba(69, 39, 75, 0.04);
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem;
            border-radius: 50%;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-item--inactive {
            color: var(--on-surface-variant);
        }

        .nav-item--inactive:hover {
            background: var(--surface-container-low);
        }

        .nav-item--active {
            background: var(--surface-container-high);
            color: var(--primary);
            transform: scale(1.1);
        }

        .nav-item .material-symbols-outlined {
            font-size: 1.5rem;
        }

        /* --- Responsive --- */
        @media (max-width: 380px) {
            .featured-card__avatar { width: 3.5rem; height: 3.5rem; }
            .featured-card { padding: 1rem; }
        }
    </style>
</head>

    <script>
        // Live Search Filter
        const searchInput = document.getElementById('searchInput');
        const contactsList = document.getElementById('contactsList');
        const contacts = contactsList.querySelectorAll('.contact-item');

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase().trim();
            contacts.forEach(contact => {
                const name = contact.querySelector('.contact-item__name').textContent.toLowerCase();
                const email = contact.querySelector('.contact-item__email').textContent.toLowerCase();
                if (name.includes(query) || email.includes(query)) {
                    contact.style.display = '';
                    contact.style.animation = 'fadeIn 0.3s ease';
                } else {
                    contact.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>

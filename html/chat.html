<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>n-chat</title>
    <meta name="description" content="Chat on n-chat" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary: #952cb1; --primary-dim: #871ba4; --primary-container: #f1a6ff;
            --on-primary: #fff7fb; --on-primary-container: #680082;
            --surface: #fff7fb; --surface-container-low: #ffeffc;
            --surface-container-high: #fedeff; --surface-container-highest: #fdd6ff;
            --on-surface: #45274b; --on-surface-variant: #75547a;
            --outline: #926f97; --outline-variant: #cca5d0;
            --green: #4ade80;
            --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font); background: var(--surface); color: var(--on-surface);
            min-height: 100dvh; display: flex; flex-direction: column; overflow-x: hidden;
        }
        ::selection { background: var(--primary-container); color: var(--on-primary-container); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeInUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        /* ── Header ── */
        .chat-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 1rem; height: 4rem;
            background: rgba(255,247,251,0.85); backdrop-filter: blur(16px);
            box-shadow: 0 1px 12px rgba(69,39,75,0.05);
        }
        .header-left { display: flex; align-items: center; gap: 0.5rem; }
        .header-back {
            background: none; border: none; color: var(--on-surface-variant);
            cursor: pointer; padding: 0.4rem; border-radius: 50%; display: flex;
        }
        .header-back:hover { background: var(--surface-container-high); }
        .header-user { display: flex; align-items: center; gap: 0.75rem; }
        .header-avatar {
            width: 2.5rem; height: 2.5rem; border-radius: 0.75rem; overflow: hidden;
            background: var(--surface-container-highest);
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); font-weight: 800; font-size: 1rem;
        }
        .header-info { display: flex; flex-direction: column; }
        .header-name { font-weight: 700; font-size: 1rem; color: var(--on-surface); line-height: 1.2; }
        .header-status {
            font-size: 0.625rem; font-weight: 600; letter-spacing: 0.05em;
            text-transform: uppercase; color: var(--on-surface-variant);
            display: flex; align-items: center; gap: 0.3rem;
        }
        .header-status.online { color: var(--primary); }
        .status-dot { width: 0.4rem; height: 0.4rem; border-radius: 50%; background: var(--outline-variant); }
        .status-dot.online { background: var(--green); animation: pulse 2s ease-in-out infinite; }

        /* ── Chat Canvas ── */
        .chat-canvas {
            flex: 1; overflow-y: auto; padding: 5rem 1rem 5.5rem;
            max-width: 720px; margin: 0 auto; width: 100%;
            display: flex; flex-direction: column; gap: 0.5rem;
        }

        /* Messages */
        .msg { display: flex; flex-direction: column; animation: fadeInUp 0.2s ease; }
        .msg.mine { align-items: flex-end; }
        .msg.theirs { align-items: flex-start; }
        .msg__bubble {
            max-width: 80%; padding: 0.75rem 1rem;
            font-size: 0.9rem; line-height: 1.5; border-radius: 1.25rem;
            word-wrap: break-word;
        }
        .msg.mine .msg__bubble {
            background: linear-gradient(135deg, var(--primary), var(--primary-container));
            color: var(--on-primary); border-bottom-right-radius: 0.25rem;
        }
        .msg.theirs .msg__bubble {
            background: var(--surface-container-high);
            color: var(--on-surface); border-bottom-left-radius: 0.25rem;
        }
        .msg__time { font-size: 0.55rem; color: var(--on-surface-variant); margin-top: 0.2rem; padding: 0 0.5rem; }

        /* Input Bar */
        .input-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
            padding: 0.75rem 1rem 1.5rem;
            background: rgba(255,247,251,0.9); backdrop-filter: blur(16px);
        }
        .input-bar__inner {
            display: flex; align-items: center; gap: 0.5rem;
            max-width: 720px; margin: 0 auto;
        }
        .input-bar__field {
            flex: 1; background: var(--surface-container-low); border: none;
            border-radius: 999px; padding: 0.85rem 1.25rem;
            font-family: var(--font); font-size: 0.9rem; color: var(--on-surface); outline: none;
            transition: all 0.3s;
        }
        .input-bar__field::placeholder { color: rgba(117,84,122,0.4); }
        .input-bar__field:focus { box-shadow: 0 0 0 3px rgba(149,44,177,0.12); background: var(--surface); }
        .send-btn {
            width: 3rem; height: 3rem; border-radius: 50%; border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-container));
            color: var(--on-primary); cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s;
        }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(149,44,177,0.2); }
        .send-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <header class="chat-header">
        <div class="header-left">
            <button class="header-back" onclick="history.back()">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div class="header-user">
                <div class="header-avatar" id="chatAvatar">?</div>
                <div class="header-info">
                    <span class="header-name" id="chatName">Loading...</span>
                    <span class="header-status" id="chatStatus">
                        <span class="status-dot" id="statusDot"></span>
                        <span id="statusText">connecting</span>
                    </span>
                </div>
            </div>
        </div>
    </header>

    <main class="chat-canvas" id="chatCanvas"></main>

    <div class="input-bar">
        <div class="input-bar__inner">
            <input class="input-bar__field" id="messageInput" type="text" placeholder="Write a message..." autocomplete="off" />
            <button class="send-btn" id="sendBtn" aria-label="Send">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // Require login
        if (!NChat.Visitor.isLoggedIn()) {
            window.location.href = 'login.html';
        }

        // Get conversation ID from URL
        const params = new URLSearchParams(window.location.search);
        const conversationId = parseInt(params.get('conversation'));
        if (!conversationId) {
            window.location.href = 'contacts.html';
        }

        const chatCanvas = document.getElementById('chatCanvas');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const renderedIds = new Set();
        let myInfo = NChat.Visitor.getInfo();
        let isSending = false;

        // ── Init ──
        async function init() {
            try {
                const data = await NChat.Visitor.getConversationMessages(conversationId);

                // Set header info
                if (data.other) {
                    document.getElementById('chatName').textContent = data.other.name || data.other.username || 'User';
                    document.getElementById('chatAvatar').textContent = (data.other.name || data.other.username || '?').charAt(0).toUpperCase();
                    updateOnlineStatus(data.other.is_online);
                }

                // Render messages
                if (data.messages) {
                    data.messages.forEach(m => appendMessage(m));
                }
                scrollToBottom();

                // Start polling
                NChat.Visitor.startConversationPolling(conversationId, onNewMessages);

            } catch (err) {
                console.error('Init error:', err);
            }
        }

        function updateOnlineStatus(isOnline) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const status = document.getElementById('chatStatus');
            if (isOnline) {
                dot.classList.add('online');
                text.textContent = 'online';
                status.classList.add('online');
            } else {
                dot.classList.remove('online');
                text.textContent = 'offline';
                status.classList.remove('online');
            }
        }

        function appendMessage(msg) {
            if (renderedIds.has(msg.id)) return;
            renderedIds.add(msg.id);

            const isMine = msg.sender_type === 'visitor' && msg.sender_id === myInfo.id;
            const div = document.createElement('div');
            div.className = `msg ${isMine ? 'mine' : 'theirs'}`;
            div.dataset.id = msg.id;
            div.innerHTML = `
                <div class="msg__bubble">${escapeHtml(msg.body)}</div>
                <span class="msg__time">${msg.time || ''}</span>
            `;
            chatCanvas.appendChild(div);
        }

        function onNewMessages(messages, otherOnline) {
            updateOnlineStatus(otherOnline);
            messages.forEach(m => appendMessage(m));
            scrollToBottom();
        }

        function scrollToBottom() {
            chatCanvas.scrollTop = chatCanvas.scrollHeight;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // ── Send ──
        async function sendMessage() {
            const body = messageInput.value.trim();
            if (!body || isSending) return;
            isSending = true;

            messageInput.value = '';

            // Optimistic append
            const tempId = 'temp_' + Date.now();
            const tempDiv = document.createElement('div');
            tempDiv.className = 'msg mine';
            tempDiv.dataset.id = tempId;
            tempDiv.innerHTML = `
                <div class="msg__bubble">${escapeHtml(body)}</div>
                <span class="msg__time">sending...</span>
            `;
            chatCanvas.appendChild(tempDiv);
            scrollToBottom();

            try {
                const data = await NChat.Visitor.sendMessage(body, conversationId);
                if (data.message) {
                    renderedIds.add(data.message.id);
                    tempDiv.querySelector('.msg__time').textContent = data.message.time || '';
                    tempDiv.dataset.id = data.message.id;
                }
            } catch (err) {
                tempDiv.querySelector('.msg__time').textContent = 'failed';
                console.error('Send error:', err);
            }

            isSending = false;
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>n-chat | Contacts</title>
    <meta name="description" content="Your contacts on n-chat" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary: #952cb1; --primary-dim: #871ba4; --primary-container: #f1a6ff;
            --on-primary: #fff7fb; --on-primary-container: #680082;
            --secondary: #8c3e9b; --secondary-container: #fed6ff;
            --on-secondary-container: #7d308d;
            --surface: #fff7fb; --surface-container-low: #ffeffc;
            --surface-container-high: #fedeff; --surface-container-highest: #fdd6ff;
            --on-surface: #45274b; --on-surface-variant: #75547a;
            --outline: #926f97; --outline-variant: #cca5d0;
            --green: #4ade80;
            --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font); background: var(--surface); color: var(--on-surface);
            min-height: 100dvh; overflow-x: hidden;
        }
        ::selection { background: var(--primary-container); color: var(--on-primary-container); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Topbar ── */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 1.5rem; height: 4rem;
            background: rgba(255,247,251,0.85); backdrop-filter: blur(16px);
            box-shadow: 0 1px 12px rgba(69,39,75,0.05);
        }
        .topbar__left { display: flex; align-items: center; gap: 0.75rem; }
        .topbar__avatar {
            width: 2.5rem; height: 2.5rem; border-radius: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-container));
            display: flex; align-items: center; justify-content: center;
            color: var(--on-primary); font-weight: 800; font-size: 1rem;
        }
        .topbar__info { display: flex; flex-direction: column; }
        .topbar__title { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.02em; color: var(--primary); }
        .topbar__username { font-size: 0.65rem; font-weight: 600; color: var(--on-surface-variant); letter-spacing: 0.03em; }
        .topbar__actions { display: flex; align-items: center; gap: 0.5rem; }
        .topbar__btn {
            background: none; border: none; color: var(--on-surface-variant); cursor: pointer;
            padding: 0.5rem; border-radius: 50%; display: flex; align-items: center;
            transition: all 0.2s;
        }
        .topbar__btn:hover { background: var(--surface-container-high); color: var(--primary); }
        .topbar__btn--chat {
            text-decoration: none; background: var(--surface-container-high);
            color: var(--primary); font-size: 0.7rem; font-weight: 700;
            padding: 0.4rem 0.8rem; border-radius: 999px; text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .topbar__btn--chat:hover { background: var(--surface-container-highest); }

        /* ── Content ── */
        .main { padding: 5.5rem 1.5rem 8rem; max-width: 640px; margin: 0 auto; animation: fadeIn 0.4s ease; }

        /* Search */
        .search-bar { position: relative; margin-bottom: 2rem; }
        .search-bar__icon {
            position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%);
            color: rgba(117,84,122,0.5); font-size: 1.25rem; pointer-events: none;
        }
        .search-bar__input {
            width: 100%; background: var(--surface-container-low); border: none;
            border-radius: 999px; padding: 0.9rem 1.5rem 0.9rem 3.5rem;
            font-family: var(--font); font-size: 0.9rem; color: var(--on-surface); outline: none;
            transition: all 0.3s;
        }
        .search-bar__input::placeholder { color: rgba(117,84,122,0.4); }
        .search-bar__input:focus { box-shadow: 0 0 0 3px rgba(149,44,177,0.12); background: var(--surface); }

        /* Search Results Dropdown */
        .search-results {
            position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
            background: var(--surface); border-radius: 1rem; margin-top: 0.5rem;
            box-shadow: 0 8px 32px rgba(69,39,75,0.12);
            display: none; overflow: hidden;
        }
        .search-results.show { display: block; }
        .search-result-item {
            display: flex; align-items: center; gap: 1rem; padding: 0.9rem 1.25rem;
            cursor: pointer; transition: background 0.15s;
        }
        .search-result-item:hover { background: var(--surface-container-low); }
        .search-result-item__avatar {
            width: 2.5rem; height: 2.5rem; border-radius: 0.75rem;
            background: var(--surface-container-highest);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem; color: var(--primary); flex-shrink: 0;
        }
        .search-result-item__info { flex: 1; }
        .search-result-item__name { font-weight: 700; font-size: 0.95rem; color: var(--on-surface); }
        .search-result-item__user { font-size: 0.75rem; color: var(--on-surface-variant); }
        .search-result-item__action {
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
            color: var(--primary); background: var(--surface-container-high);
            padding: 0.3rem 0.7rem; border-radius: 999px; letter-spacing: 0.05em;
        }
        .search-no-results { padding: 1.25rem; text-align: center; color: var(--on-surface-variant); font-size: 0.85rem; }

        /* Section */
        .section-title {
            font-size: 0.6875rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.15em; color: var(--on-surface-variant);
            padding-left: 0.5rem; margin-bottom: 1.25rem;
        }

        /* Contact List */
        .contacts-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .contact-item {
            display: flex; align-items: center; gap: 1.25rem; padding: 0.75rem 0.75rem;
            border-radius: 1rem; cursor: pointer; transition: all 0.2s;
            text-decoration: none; color: inherit; animation: fadeInUp 0.3s ease;
        }
        .contact-item:hover { background: var(--surface-container-low); }
        .contact-item:active { transform: scale(0.99); }
        .contact-item__avatar {
            width: 3.5rem; height: 3.5rem; border-radius: 1rem;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.1rem; flex-shrink: 0;
        }
        .contact-item__avatar--admin {
            background: linear-gradient(135deg, var(--primary), var(--primary-container));
            color: var(--on-primary);
        }
        .contact-item__avatar--visitor {
            background: var(--surface-container-highest);
            color: var(--primary);
        }
        .contact-item__body { flex: 1; min-width: 0; }
        .contact-item__top { display: flex; justify-content: space-between; align-items: center; }
        .contact-item__name { font-weight: 700; font-size: 1rem; color: var(--on-surface); }
        .contact-item__time { font-size: 0.625rem; font-weight: 600; color: var(--on-surface-variant); }
        .contact-item__bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 0.2rem; }
        .contact-item__preview {
            font-size: 0.825rem; color: var(--on-surface-variant);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%;
        }
        .contact-item__badge {
            min-width: 1.25rem; height: 1.25rem; border-radius: 999px;
            background: linear-gradient(135deg, var(--primary), var(--primary-container));
            color: var(--on-primary); font-size: 0.6rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            padding: 0 0.35rem;
        }
        .contact-item__status-dot {
            width: 0.5rem; height: 0.5rem; border-radius: 50%;
            position: absolute; bottom: 2px; right: 2px;
        }
        .contact-item__avatar-wrap { position: relative; }
        .contact-item__status-dot.online { background: var(--green); box-shadow: 0 0 0 2px var(--surface); }
        .contact-item__status-dot.offline { background: var(--outline-variant); box-shadow: 0 0 0 2px var(--surface); }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 3rem 1.5rem; animation: fadeInUp 0.5s ease;
        }
        .empty-state__icon { font-size: 3rem; color: var(--outline-variant); margin-bottom: 1rem; }
        .empty-state__title { font-size: 1.1rem; font-weight: 700; color: var(--on-surface); margin-bottom: 0.35rem; }
        .empty-state__sub { font-size: 0.85rem; color: var(--on-surface-variant); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
            display: flex; justify-content: space-around; align-items: center;
            padding: 0.5rem 2rem 1.5rem; background: var(--surface);
            border-radius: 2.5rem 2.5rem 0 0; box-shadow: 0 -4px 20px rgba(69,39,75,0.04);
        }
        .nav-item {
            display: flex; align-items: center; justify-content: center;
            padding: 0.75rem; border-radius: 50%; text-decoration: none;
            transition: all 0.3s;
        }
        .nav-item--inactive { color: var(--on-surface-variant); }
        .nav-item--inactive:hover { background: var(--surface-container-low); }
        .nav-item--active { background: var(--surface-container-high); color: var(--primary); transform: scale(1.1); }
        .nav-item .material-symbols-outlined { font-size: 1.5rem; }

        /* Logout */
        .logout-btn {
            display: block; margin: 2rem auto 0; padding: 0.6rem 1.5rem; border: none; border-radius: 999px;
            background: rgba(172,49,73,0.08); color: var(--error, #ac3149);
            font-family: var(--font); font-size: 0.75rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.08em;
        }
        .logout-btn:hover { background: rgba(172,49,73,0.15); }
    </style>
</head>
<body>
    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar__left">
            <div class="topbar__avatar" id="myAvatar">?</div>
            <div class="topbar__info">
                <span class="topbar__title">n-chat</span>
                <span class="topbar__username" id="myUsername">@loading</span>
            </div>
        </div>
        <div class="topbar__actions">
            <a class="topbar__btn--chat" href="visitor.html">Chat</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Search -->
        <div class="search-bar">
            <span class="material-symbols-outlined search-bar__icon">search</span>
            <input class="search-bar__input" type="text" placeholder="Search users by username..." id="searchInput" autocomplete="off" />
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- Contacts Section -->
        <section>
            <h2 class="section-title">Conversations</h2>
            <div class="contacts-list" id="contactsList">
                <!-- Filled by JS -->
            </div>
        </section>

        <button class="logout-btn" id="logoutBtn">Logout</button>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a class="nav-item nav-item--inactive" href="visitor.html" aria-label="Chats">
            <span class="material-symbols-outlined">chat_bubble</span>
        </a>
        <a class="nav-item nav-item--active" href="contacts.html" aria-label="Contacts">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">contacts</span>
        </a>
    </nav>

    <script src="api.js"></script>
    <script>
        // Require login
        if (!NChat.Visitor.isLoggedIn()) {
            window.location.href = 'login.html';
        }

        const contactsList = document.getElementById('contactsList');
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        let searchTimeout = null;
        let contacts = [];
        let adminPresenceReady = false;
        let adminPresenceSnapshot = { members: [] };
        const contactConversationSlots = new Set();
        const conversationPresenceSnapshots = {};

        function hasAdminMember(snapshot) {
            return Array.isArray(snapshot && snapshot.members)
                && snapshot.members.some(member => String(member.id).startsWith('admin-'));
        }

        function hasConversationMember(conversationId, visitorId, fallback = false) {
            const snapshot = conversationPresenceSnapshots[conversationId];
            if (!snapshot || !Array.isArray(snapshot.members)) {
                return fallback;
            }

            return snapshot.members.some(member => String(member.id) === `visitor-${visitorId}`);
        }

        function applyLivePresence(items) {
            return (items || []).map(contact => {
                if (!contact.other) {
                    return contact;
                }

                const other = { ...contact.other };
                if (other.type === 'admin') {
                    other.is_online = adminPresenceReady
                        ? hasAdminMember(adminPresenceSnapshot)
                        : other.is_online;
                } else {
                    other.is_online = hasConversationMember(
                        contact.conversation_id,
                        other.id,
                        other.is_online
                    );
                }

                return {
                    ...contact,
                    other,
                };
            });
        }

        function contactSortValue(contact) {
            const timestamp = contact && contact.last_message && contact.last_message.created_at;
            const value = timestamp ? Date.parse(timestamp) : NaN;
            return Number.isNaN(value) ? 0 : value;
        }

        function sortContactsInPlace() {
            contacts.sort((left, right) => contactSortValue(right) - contactSortValue(left));
        }

        function isIncomingForCurrentVisitor(message) {
            const me = NChat.Visitor.getInfo();
            if (!message) {
                return false;
            }

            if (message.sender_type === 'assistant' || message.sender_type === 'admin') {
                return true;
            }

            return Number(message.sender_id || 0) !== Number(me && me.id);
        }

        function patchContactFromEvent(event) {
            const message = event && event.message ? event.message : event;
            if (!message || !message.conversation_id) {
                loadContacts();
                return;
            }

            const index = contacts.findIndex(contact => Number(contact.conversation_id) === Number(message.conversation_id));
            if (index === -1) {
                loadContacts();
                return;
            }

            const current = contacts[index];
            const createdAt = message.created_at
                || (current.last_message && current.last_message.created_at)
                || null;

            const nextContact = {
                ...current,
                last_message: {
                    body: message.body || '',
                    created_at: createdAt,
                    time: NChat.formatLocalTime(createdAt, message.time || ''),
                    sender_type: message.sender_type,
                },
                unread_count: isIncomingForCurrentVisitor(message)
                    ? Number(current.unread_count || 0) + 1
                    : 0,
            };

            contacts[index] = applyLivePresence([nextContact])[0];
            sortContactsInPlace();
            renderContacts(contacts);
        }

        function syncContactSubscriptions() {
            const desiredSlots = new Set();

            contacts.forEach(contact => {
                if (!contact || !contact.conversation_id) {
                    return;
                }

                const slot = `visitorContactsConversation_${contact.conversation_id}`;
                desiredSlots.add(slot);

                if (contactConversationSlots.has(slot)) {
                    return;
                }

                contactConversationSlots.add(slot);
                NChat.Visitor.subscribeToConversation(contact.conversation_id, {
                    onMessage: patchContactFromEvent,
                    onPresenceChange: snapshot => {
                        conversationPresenceSnapshots[contact.conversation_id] = snapshot;
                        contacts = applyLivePresence(contacts);
                        sortContactsInPlace();
                        renderContacts(contacts);
                    },
                }, slot).catch(err => {
                    console.error('Conversation subscribe error:', err);
                });
            });

            Array.from(contactConversationSlots).forEach(slot => {
                if (desiredSlots.has(slot)) {
                    return;
                }

                contactConversationSlots.delete(slot);
                NChat.Visitor.unsubscribeConversation(slot);
            });
        }

        // ── Init ──
        async function init() {
            // Set user info in topbar
            const info = NChat.Visitor.getInfo();
            if (info) {
                document.getElementById('myAvatar').textContent = (info.name || info.username || '?').charAt(0).toUpperCase();
                document.getElementById('myUsername').textContent = '@' + (info.username || 'user');
            }

            NChat.Visitor.subscribeToAdminPresence(snapshot => {
                adminPresenceReady = true;
                adminPresenceSnapshot = snapshot;
                contacts = applyLivePresence(contacts);
                sortContactsInPlace();
                renderContacts(contacts);
            }, 'visitorContactsAdminPresence').catch(err => {
                console.error('Admin presence error:', err);
            });

            await loadContacts();
        }

        // ── Load Contacts ──
        async function loadContacts() {
            try {
                const data = await NChat.Visitor.getContacts();
                contacts = applyLivePresence(data.contacts || []);
                sortContactsInPlace();
                renderContacts(contacts);
                syncContactSubscriptions();
            } catch (err) {
                console.error('Load contacts error:', err);
                contactsList.innerHTML = '<div class="empty-state"><div class="empty-state__icon"><span class="material-symbols-outlined" style="font-size:3rem;">error</span></div><div class="empty-state__title">Could not load contacts</div></div>';
            }
        }

        function renderContacts(contacts) {
            if (contacts.length === 0) {
                contactsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state__icon"><span class="material-symbols-outlined" style="font-size:3rem;">forum</span></div>
                        <div class="empty-state__title">No conversations yet</div>
                        <div class="empty-state__sub">Search for users by username to start chatting!</div>
                    </div>
                `;
                return;
            }

            contactsList.innerHTML = contacts.map(c => {
                const other = c.other;
                if (!other) return '';
                const isAdmin = other.type === 'admin';
                const initial = (other.name || other.username || '?').charAt(0).toUpperCase();
                const avatarClass = isAdmin ? 'contact-item__avatar--admin' : 'contact-item__avatar--visitor';
                const chatLink = isAdmin ? 'visitor.html' : `chat.html?conversation=${c.conversation_id}`;
                const lastMsg = NChat.conversationPreview(c.last_message, 'visitor');
                const lastTime = c.last_message
                    ? NChat.formatLocalTime(c.last_message.created_at, c.last_message.time || '')
                    : '';
                const badge = c.unread_count > 0 ? `<span class="contact-item__badge">${c.unread_count}</span>` : '';
                const onlineClass = other.is_online ? 'online' : 'offline';

                return `
                    <a class="contact-item" href="${chatLink}">
                        <div class="contact-item__avatar-wrap">
                            <div class="contact-item__avatar ${avatarClass}">${initial}</div>
                            <span class="contact-item__status-dot ${onlineClass}"></span>
                        </div>
                        <div class="contact-item__body">
                            <div class="contact-item__top">
                                <span class="contact-item__name">${other.name}${isAdmin ? ' ⭐' : ''}</span>
                                <span class="contact-item__time">${lastTime}</span>
                            </div>
                            <div class="contact-item__bottom">
                                <span class="contact-item__preview">${lastMsg}</span>
                                ${badge}
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        // ── Search Users ──
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            const q = searchInput.value.trim();
            if (q.length < 2) {
                searchResults.classList.remove('show');
                searchResults.innerHTML = '';
                return;
            }
            searchTimeout = setTimeout(async () => {
                try {
                    const data = await NChat.Visitor.searchUsers(q);
                    if (data.users && data.users.length > 0) {
                        searchResults.innerHTML = data.users.map(u => `
                            <div class="search-result-item" data-username="${u.username}">
                                <div class="search-result-item__avatar">${(u.name || u.username).charAt(0).toUpperCase()}</div>
                                <div class="search-result-item__info">
                                    <div class="search-result-item__name">${u.name}</div>
                                    <div class="search-result-item__user">@${u.username}</div>
                                </div>
                                <span class="search-result-item__action">Chat</span>
                            </div>
                        `).join('');
                        searchResults.classList.add('show');

                        // Add click handlers
                        searchResults.querySelectorAll('.search-result-item').forEach(el => {
                            el.addEventListener('click', async () => {
                                const username = el.dataset.username;
                                try {
                                    const data = await NChat.Visitor.startChat(username);
                                    window.location.href = `chat.html?conversation=${data.conversation_id}`;
                                } catch (err) {
                                    console.error('Start chat error:', err);
                                }
                            });
                        });
                    } else {
                        searchResults.innerHTML = '<div class="search-no-results">No users found</div>';
                        searchResults.classList.add('show');
                    }
                } catch (err) {
                    console.error('Search error:', err);
                }
            }, 300);
        });

        // Close search on blur
        searchInput.addEventListener('blur', () => {
            setTimeout(() => searchResults.classList.remove('show'), 200);
        });

        // ── Logout ──
        document.getElementById('logoutBtn').addEventListener('click', () => {
            NChat.Visitor.disconnectRealtime();
            NChat.Visitor.clearToken();
            window.location.href = 'visitor.html';
        });

        // ── Refresh contacts periodically ──
        window.addEventListener('beforeunload', () => {
            NChat.Visitor.disconnectRealtime();
        });
        window.setInterval(() => renderContacts(contacts), 30000);

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>n-chat</title>
    <meta name="description" content="Chat with me directly – powered by n-chat" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary: #952cb1;
            --primary-dim: #871ba4;
            --primary-container: #f1a6ff;
            --on-primary: #fff7fb;
            --on-primary-container: #680082;
            --secondary-container: #fed6ff;
            --on-secondary-container: #7d308d;
            --surface: #fff7fb;
            --surface-container-low: #ffeffc;
            --surface-container-high: #fedeff;
            --surface-container-highest: #fdd6ff;
            --on-surface: #45274b;
            --on-surface-variant: #75547a;
            --outline: #926f97;
            --outline-variant: #cca5d0;
            --error: #ac3149;
            --green: #4ade80;
            --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font);
            background: var(--surface);
            color: var(--on-surface);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        ::selection { background: var(--primary-container); color: var(--on-primary-container); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        /* Ambient BG */
        .bg-glow { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; opacity: 0.2; }
        .bg-glow--1 { top: 20%; left: -5rem; width: 20rem; height: 20rem; background: rgba(149,44,177,0.2); filter: blur(100px); }
        .bg-glow--2 { bottom: 10%; right: -5rem; width: 16rem; height: 16rem; background: rgba(172,45,94,0.2); filter: blur(80px); }

        /* ── Header ── */
        .chat-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 1.25rem; height: 4rem;
            background: rgba(255,247,251,0.85); backdrop-filter: blur(16px);
            box-shadow: 0 1px 12px rgba(69,39,75,0.05);
        }
        .header-user { display: flex; align-items: center; gap: 0.75rem; }
        .header-avatar {
            width: 2.5rem; height: 2.5rem; border-radius: 0.75rem; overflow: hidden;
            background: linear-gradient(135deg, var(--primary), var(--primary-container));
            display: flex; align-items: center; justify-content: center;
            color: var(--on-primary); font-weight: 800; font-size: 1rem;
        }
        .header-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .header-info { display: flex; flex-direction: column; }
        .header-name { font-weight: 700; font-size: 1rem; color: var(--on-surface); line-height: 1.2; }
        .header-status {
            font-size: 0.625rem; font-weight: 600; letter-spacing: 0.05em;
            text-transform: uppercase; color: var(--on-surface-variant);
            display: flex; align-items: center; gap: 0.3rem;
        }
        .header-status.online { color: var(--primary); }
        .status-dot {
            width: 0.4rem; height: 0.4rem; border-radius: 50%; background: var(--outline-variant);
        }
        .status-dot.online { background: var(--green); animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        .header-brand {
            font-size: 0.7rem; font-weight: 700; color: var(--outline-variant);
            letter-spacing: 0.1em; text-transform: uppercase;
        }
        .header-actions { display: flex; align-items: center; gap: 0.5rem; }
        .header-actions a {
            font-family: var(--font); font-size: 0.75rem; font-weight: 700;
            text-decoration: none; padding: 0.4rem 0.9rem; border-radius: 999px;
            transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .header-actions__login {
            color: var(--primary); background: var(--surface-container-high);
        }
        .header-actions__login:hover { background: var(--surface-container-highest); }
        .header-actions__contacts {
            color: var(--on-primary); background: linear-gradient(135deg, var(--primary), var(--primary-container));
            box-shadow: 0 2px 8px rgba(149,44,177,0.15);
        }
        .header-actions__contacts:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(149,44,177,0.25); }
        .header-actions__username {
            font-size: 0.65rem; font-weight: 700; color: var(--on-surface-variant);
            letter-spacing: 0.05em;
        }

        /* ── Chat Canvas ── */
        .chat-canvas {
            flex: 1; overflow-y: auto; padding: 5rem 1rem 1rem; /* extra bottom will be added for input+popup */
            max-width: 720px; margin: 0 auto; width: 100%;
            display: flex; flex-direction: column; gap: 1.25rem;
            position: relative; z-index: 1;
        }

        /* Welcome message */
        .welcome-card {
            text-align: center; padding: 2rem 1.5rem; margin: 1rem 0;
            animation: fadeInUp 0.5s ease-out;
        }
        .welcome-card__icon { font-size: 3rem; color: var(--primary); margin-bottom: 0.75rem; }
        .welcome-card__title {
            font-size: 1.5rem; font-weight: 800; color: var(--on-surface);
            margin-bottom: 0.35rem;
        }
        .welcome-card__sub { color: var(--on-surface-variant); font-size: 0.9rem; }

        @keyframes fadeInUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

        /* Day divider */
        .day-divider { display: flex; justify-content: center; margin: 0.5rem 0; }
        .day-divider span {
            background: var(--surface-container-low); padding: 0.3rem 0.9rem;
            border-radius: 999px; font-size: 0.625rem; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase; color: var(--on-surface-variant);
        }

        /* Message groups */
        .msg-group {
            display: flex; flex-direction: column; gap: 0.4rem; max-width: 85%;
            animation: msgIn 0.25s ease-out;
        }
        @keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .msg-group--received { align-items: flex-start; align-self: flex-start; }
        .msg-group--sent { align-items: flex-end; align-self: flex-end; }

        .bubble {
            padding: 0.75rem 1.1rem; font-size: 0.9375rem; line-height: 1.55;
            word-break: break-word;
        }
        .bubble--received {
            background: var(--surface-container-highest); color: var(--on-surface);
            border-radius: 1.25rem; border-bottom-left-radius: 0.35rem;
        }
        .bubble--sent {
            background: linear-gradient(135deg, var(--primary), var(--primary-dim));
            color: var(--on-primary); border-radius: 1.25rem; border-bottom-right-radius: 0.35rem;
            box-shadow: 0 3px 12px rgba(149,44,177,0.12);
        }
        .bubble--assistant {
            background: linear-gradient(135deg, #f8e6ff, #ffeef8);
            color: var(--on-surface);
            border: 1px solid rgba(149,44,177,0.14);
            border-radius: 1.25rem;
            border-bottom-left-radius: 0.35rem;
        }
        .bubble--assistant a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 0.12em;
        }

        .msg-label {
            font-size: 0.56rem; font-weight: 800; letter-spacing: 0.14em;
            text-transform: uppercase; color: rgba(117,84,122,0.6);
        }
        .msg-group--received .msg-label { margin-left: 0.2rem; }
        .msg-group--sent .msg-label { margin-right: 0.2rem; }

        .timestamp {
            font-size: 0.6rem; font-weight: 500; color: rgba(117,84,122,0.55); margin-top: 0.1rem;
        }
        .msg-group--received .timestamp { margin-left: 0.2rem; }
        .msg-group--sent .timestamp { margin-right: 0.2rem; }

        /* Typing indicator */
        .typing { display: none; align-items: center; gap: 0.3rem; padding: 0.75rem 1.1rem;
            background: var(--surface-container-highest); border-radius: 1.25rem; border-bottom-left-radius: 0.35rem;
            align-self: flex-start; max-width: 85%;
        }
        .typing.show { display: flex; }
        .typing-dot {
            width: 0.35rem; height: 0.35rem; border-radius: 50%; background: var(--on-surface-variant);
            animation: bounce 1.4s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }
        .typing-text { font-size: 0.75rem; color: var(--on-surface-variant); margin-left: 0.25rem; }
        @keyframes bounce { 0%,60%,100% { transform:translateY(0); opacity:0.3; } 30% { transform:translateY(-4px); opacity:1; } }

        /* ── Save Chat Popup ── */
        .save-popup {
            position: fixed; bottom: 4.5rem; left: 0; right: 0; z-index: 45;
            padding: 0 0.75rem;
            display: none;
        }
        .save-popup.show { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        .save-popup__card {
            max-width: 720px; margin: 0 auto;
            background: rgba(255,247,251,0.95); backdrop-filter: blur(20px);
            border-radius: 1.25rem; padding: 1rem 1.25rem;
            box-shadow: 0 -4px 24px rgba(69,39,75,0.08);
            border: 1px solid rgba(204,165,208,0.15);
        }
        .save-popup__header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;
        }
        .save-popup__title { font-size: 0.8rem; font-weight: 700; color: var(--on-surface); }
        .save-popup__close {
            background: none; border: none; cursor: pointer; color: var(--on-surface-variant);
            padding: 0.25rem; display: flex; border-radius: 50%; transition: all 0.2s;
        }
        .save-popup__close:hover { background: var(--surface-container-high); }
        .save-popup__close .material-symbols-outlined { font-size: 1.1rem; }
        .save-popup__desc { font-size: 0.75rem; color: var(--on-surface-variant); margin-bottom: 0.75rem; }

        .save-popup__actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .save-popup__btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-container));
            color: var(--on-primary); border: none; border-radius: 999px;
            padding: 0.6rem 1.25rem; font-family: var(--font); font-size: 0.8rem;
            font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap;
            text-decoration: none;
            flex: 1 1 140px;
        }
        .save-popup__btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(149,44,177,0.25); }
        .save-popup__btn:active { transform: scale(0.97); }
        .save-popup__btn--secondary {
            background: var(--surface-container-high);
            color: var(--primary);
            box-shadow: none;
        }
        .save-popup__success { display: none; }

        /* ── Bottom Input ── */
        .input-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
            padding: 0.5rem 0.75rem 0.75rem;
            background: rgba(255,247,251,0.92); backdrop-filter: blur(20px);
        }
        .input-bar__inner {
            max-width: 720px; margin: 0 auto;
            display: flex; align-items: center; gap: 0.4rem;
            background: var(--surface-container-high); border-radius: 999px;
            padding: 0.3rem 0.3rem 0.3rem 0.75rem;
            box-shadow: 0 2px 10px rgba(69,39,75,0.04);
        }
        .input-bar__field {
            flex: 1; background: transparent; border: none; color: var(--on-surface);
            font-family: var(--font); font-size: 0.9rem; outline: none; min-width: 0;
        }
        .input-bar__field::placeholder { color: rgba(117,84,122,0.5); }
        .input-bar__btn {
            background: none; border: none; color: var(--on-surface-variant); cursor: pointer;
            padding: 0.4rem; display: flex; align-items: center; border-radius: 50%;
            transition: color 0.2s; flex-shrink: 0;
        }
        .input-bar__btn:hover { color: var(--primary); }
        .send-btn {
            width: 2.5rem; height: 2.5rem; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-container));
            color: var(--on-primary); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 12px rgba(149,44,177,0.2); transition: all 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 5px 16px rgba(149,44,177,0.3); }
        .send-btn:active { transform: scale(0.92); }
        .send-btn .material-symbols-outlined { font-variation-settings: 'FILL' 1; font-size: 1.15rem; }

        /* ── Loading State ── */
        .loading-screen {
            position: fixed; inset: 0; z-index: 100; background: var(--surface);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 1rem;
        }
        .loading-screen.hidden { display: none; }
        .loading-spinner {
            width: 2rem; height: 2rem; border: 3px solid var(--surface-container-highest);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 0.8rem; color: var(--on-surface-variant); font-weight: 500; }

        /* ── Empty State ── */
        .empty-state { text-align: center; padding: 3rem 1rem; }
        .empty-state .material-symbols-outlined { font-size: 3rem; color: var(--primary-container); }
        .empty-state p { margin-top: 0.5rem; color: var(--on-surface-variant); font-size: 0.9rem; }
    </style>
</head>
<body>
    <!-- Ambient BG -->
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>

    <!-- Loading -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <span class="loading-text">Connecting...</span>
    </div>

    <!-- Header -->
    <header class="chat-header">
        <div class="header-user">
            <div class="header-avatar" id="adminAvatar">N</div>
            <div class="header-info">
                <span class="header-name" id="adminName">Loading...</span>
                <span class="header-status" id="adminStatus">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">connecting</span>
                </span>
            </div>
        </div>
        <div class="header-actions" id="headerActions">
            <!-- Filled by JS: login link or contacts+username -->
        </div>
    </header>

    <!-- Chat Canvas -->
    <main class="chat-canvas" id="chatCanvas">
        <!-- Welcome card (shown when no messages) -->
        <div class="welcome-card" id="welcomeCard" style="display:none;">
            <div class="welcome-card__icon">
                <span class="material-symbols-outlined" style="font-size:3rem;">waving_hand</span>
            </div>
            <h2 class="welcome-card__title">Hey there! 👋</h2>
            <p class="welcome-card__sub">Send me a message and I'll get back to you soon.</p>
        </div>
        <div class="typing" id="typingIndicator">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-text" id="typingText">Admin is typing...</span>
        </div>
    </main>

    <!-- Save Chat Popup -->
    <div class="save-popup" id="savePopup">
        <div class="save-popup__card">
            <div class="save-popup__header">
                <span class="save-popup__title">💬 Save your chat</span>
                <button class="save-popup__close" id="closePopup">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <p class="save-popup__desc">Log in or sign up right here to save this conversation for later.</p>
            <div class="save-popup__actions">
                <a class="save-popup__btn save-popup__btn--secondary" href="login.html">Login</a>
                <a class="save-popup__btn" href="signup.html">Sign up</a>
            </div>
            <div class="save-popup__success" id="saveSuccess">✓ Saved! We'll keep your chat safe.</div>
        </div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
        <div class="input-bar__inner">
            <input class="input-bar__field" id="messageInput" type="text" placeholder="Write a message..." autocomplete="off" />
            <button class="input-bar__btn" aria-label="Emoji">
                <span class="material-symbols-outlined">mood</span>
            </button>
            <button class="send-btn" id="sendBtn" aria-label="Send">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // ── State ──
        let adminInfo = null;
        let visitorInfo = null;
        let conversationId = null;
        let hasShownPopup = false;
        let messageCount = 0;
        const renderedIds = new Set();  // dedup: tracks all rendered message IDs
        const pendingMessages = new Map();
        let isSending = false;          // send lock to prevent double-clicks

        // ── DOM Refs ──
        const chatCanvas = document.getElementById('chatCanvas');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const loadingScreen = document.getElementById('loadingScreen');
        const welcomeCard = document.getElementById('welcomeCard');
        const savePopup = document.getElementById('savePopup');
        document.querySelector('.save-popup__title').textContent = 'Save your chat';
        const adminNameEl = document.getElementById('adminName');
        const adminAvatarEl = document.getElementById('adminAvatar');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const headerStatus = document.querySelector('.header-status');
        const typingIndicator = document.getElementById('typingIndicator');
        const typingText = document.getElementById('typingText');
        let adminOnline = false;
        let adminTyping = false;
        let remoteTypingTimer = null;
        let localTypingTimer = null;
        let typingSent = false;
        const TYPING_IDLE_MS = 1400;
        const TYPING_REMOTE_TIMEOUT_MS = 2600;

        function hasAdminMember(snapshot) {
            return Array.isArray(snapshot && snapshot.members)
                && snapshot.members.some(member => String(member.id).startsWith('admin-'));
        }

        function nextClientId() {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                return window.crypto.randomUUID();
            }

            return `msg-${Date.now()}-${Math.random().toString(16).slice(2, 10)}`.slice(0, 36);
        }

        function createMessageLabel(senderType) {
            const labelText = NChat.senderBadge(senderType);
            if (!labelText) {
                return null;
            }

            const label = document.createElement('span');
            label.className = 'msg-label';
            label.textContent = labelText;
            return label;
        }

        function createPendingMessage(clientId, body) {
            const group = document.createElement('div');
            group.className = 'msg-group msg-group--sent';
            group.dataset.clientId = clientId;
            group.dataset.pending = 'true';
            group.dataset.senderType = 'visitor';

            const bubble = document.createElement('div');
            bubble.className = 'bubble bubble--sent';
            bubble.textContent = body;

            const ts = document.createElement('span');
            ts.className = 'timestamp';
            ts.textContent = 'sending...';

            group.appendChild(bubble);
            group.appendChild(ts);
            chatCanvas.insertBefore(group, typingIndicator);
            pendingMessages.set(clientId, group);
            return group;
        }

        function messageMetaText(msg, isMine) {
            if (!msg) {
                return '';
            }

            if (!isMine) {
                return msg.time || '';
            }

            return msg.read_status
                || NChat.formatStatusTime(
                    (msg.is_read ? (msg.read_at || msg.created_at) : msg.created_at),
                    msg.is_read ? 'Seen' : 'Sent',
                    msg.is_read ? 'Seen' : 'Sent'
                );
        }

        function renderStoredMessageMeta(group) {
            if (!group) {
                return;
            }

            const ts = group.querySelector('.timestamp');
            const createdAt = group.dataset.createdAt || '';
            if (!ts || !createdAt) {
                return;
            }

            if (group.classList.contains('msg-group--sent')) {
                const isRead = group.dataset.isRead === 'true';
                ts.textContent = NChat.formatStatusTime(
                    isRead ? (group.dataset.readAt || createdAt) : createdAt,
                    isRead ? 'Seen' : 'Sent',
                    isRead ? 'Seen' : 'Sent'
                );
                return;
            }

            ts.textContent = NChat.formatLocalTime(createdAt, ts.textContent || '');
        }

        function syncMessageMeta(group, msg, isMine) {
            if (!group || !msg) {
                return;
            }

            group.dataset.createdAt = msg.created_at || '';
            group.dataset.readAt = msg.read_at || '';
            group.dataset.isRead = msg.is_read ? 'true' : 'false';

            if (isMine) {
                renderStoredMessageMeta(group);
                return;
            }

            const ts = group.querySelector('.timestamp');
            if (ts) {
                ts.textContent = messageMetaText(msg, false);
            }
        }

        function refreshMessageMeta() {
            chatCanvas.querySelectorAll('.msg-group[data-id]').forEach(renderStoredMessageMeta);
        }

        function resolvePendingMessage(msg) {
            if (!msg || !msg.client_id) {
                return false;
            }

            const group = pendingMessages.get(msg.client_id);
            if (!group) {
                return false;
            }

            const bubble = group.querySelector('.bubble');
            const ts = group.querySelector('.timestamp');

            group.dataset.id = String(msg.id);
            delete group.dataset.pending;
            group.dataset.senderType = msg.sender_type || 'visitor';

            if (bubble) {
                bubble.textContent = msg.body;
            }

            syncMessageMeta(group, msg, true);

            renderedIds.add(msg.id);
            pendingMessages.delete(msg.client_id);
            return true;
        }

        function applyReadReceipt(event) {
            if (!event || Number(event.reader_id || 0) === Number(visitorInfo && visitorInfo.id)) {
                return;
            }

            const lastReadMessageId = Number(event.last_read_message_id || 0);
            if (!Number.isFinite(lastReadMessageId) || lastReadMessageId <= 0) {
                return;
            }

            chatCanvas.querySelectorAll('.msg-group--sent[data-id]').forEach(group => {
                const messageId = Number(group.dataset.id || 0);
                if (!Number.isFinite(messageId) || messageId > lastReadMessageId) {
                    return;
                }

                group.dataset.isRead = 'true';
                group.dataset.readAt = event.read_at || '';
                renderStoredMessageMeta(group);
            });
        }

        // ── Init ──
        async function init() {
            try {
                const data = await NChat.Visitor.init();
                visitorInfo = data.visitor;
                adminInfo = data.admin;

                if (adminInfo) {
                    adminNameEl.textContent = adminInfo.name;
                    if (adminInfo.avatar_url) {
                        adminAvatarEl.innerHTML = `<img src="${adminInfo.avatar_url}" alt="${adminInfo.name}" />`;
                    } else {
                        adminAvatarEl.textContent = adminInfo.name.charAt(0).toUpperCase();
                    }
                }

                // Update header actions (login/contacts)
                updateHeaderActions();

                // Load existing messages
                const msgData = await NChat.Visitor.getMessages();
                conversationId = msgData.conversation_id || data.conversation_id;
                if (msgData.messages.length === 0) {
                    welcomeCard.style.display = '';
                } else {
                    welcomeCard.style.display = 'none';
                    addDayDivider('Today');
                    msgData.messages.forEach(m => appendMessage(m, false));
                    messageCount = msgData.messages.length;
                    refreshMessageMeta();
                }

                scrollToBottom();
                loadingScreen.classList.add('hidden');

                updateAdminStatus(false);

                await Promise.all([
                    NChat.Visitor.subscribeToConversation(conversationId, {
                        onMessage: onRealtimeMessage,
                        onTyping: onTypingEvent,
                        onRead: applyReadReceipt,
                    }),
                    NChat.Visitor.subscribeToAdminPresence(onAdminPresence),
                ]);

                // Show save popup after 2nd message if info not saved
                checkSavePopup();

            } catch (err) {
                console.error('Init error:', err);
                loadingScreen.querySelector('.loading-text').textContent = 'Connection error. Retrying...';
                setTimeout(init, 2000);
            }
        }

        function updateHeaderActions() {
            const ha = document.getElementById('headerActions');
            if (NChat.Visitor.isLoggedIn()) {
                const info = NChat.Visitor.getInfo();
                ha.innerHTML = `<span class="header-actions__username">@${info.username || 'user'}</span><a href="contacts.html" class="header-actions__contacts">Contacts</a>`;
            } else {
                ha.innerHTML = `<a href="login.html" class="header-actions__login">Login</a>`;
            }
        }

        // ── Polling Callback ──
        function onNewMessages(messages, adminOnline) {
            // Update admin status
            if (adminOnline) {
                statusDot.classList.add('online');
                statusText.textContent = 'online';
                document.querySelector('.header-status').classList.add('online');
            } else {
                statusDot.classList.remove('online');
                statusText.textContent = 'offline';
                document.querySelector('.header-status').classList.remove('online');
            }

            // Append all new messages — appendMessage handles dedup via renderedIds
            let added = false;
            messages.forEach(m => {
                if (appendMessage(m, true)) added = true;
            });
            if (added) scrollToBottom();
        }

        // ── Send Message ──
        function updateAdminStatus(isOnline) {
            adminOnline = !!isOnline;
            renderAdminPresence();
        }

        function onAdminPresence(snapshot) {
            updateAdminStatus(hasAdminMember(snapshot));
        }

        function renderAdminPresence() {
            const statusActive = adminOnline || adminTyping;
            statusDot.classList.toggle('online', statusActive);
            headerStatus.classList.toggle('online', statusActive);
            statusText.textContent = adminTyping ? 'typing...' : (adminOnline ? 'online' : 'offline');
        }

        function showTypingIndicator(name) {
            if (name) {
                typingText.textContent = `${name} is typing...`;
            }

            adminTyping = true;
            typingIndicator.classList.add('show');
            renderAdminPresence();
            scrollToBottom();
        }

        function hideTypingIndicator() {
            adminTyping = false;
            typingIndicator.classList.remove('show');
            renderAdminPresence();
        }

        function clearRemoteTypingTimer() {
            if (remoteTypingTimer) {
                clearTimeout(remoteTypingTimer);
                remoteTypingTimer = null;
            }
        }

        function scheduleRemoteTypingClear() {
            clearRemoteTypingTimer();
            remoteTypingTimer = setTimeout(() => {
                hideTypingIndicator();
            }, TYPING_REMOTE_TIMEOUT_MS);
        }

        function sendLocalTypingState(typing) {
            if (!conversationId) {
                return;
            }

            const nextState = !!typing;
            if (typingSent === nextState) {
                return;
            }

            if (!typing) {
                NChat.Visitor.sendTyping(conversationId, false);
                typingSent = false;
                return;
            }

            NChat.Visitor.sendTyping(conversationId, true);
            typingSent = true;
        }

        function stopLocalTyping() {
            if (localTypingTimer) {
                clearTimeout(localTypingTimer);
                localTypingTimer = null;
            }

            sendLocalTypingState(false);
        }

        function scheduleLocalTypingStop() {
            if (localTypingTimer) {
                clearTimeout(localTypingTimer);
            }

            localTypingTimer = setTimeout(() => {
                localTypingTimer = null;
                sendLocalTypingState(false);
            }, TYPING_IDLE_MS);
        }

        function handleTypingInput() {
            if (!conversationId) {
                return;
            }

            if (messageInput.value.trim().length === 0) {
                stopLocalTyping();
                return;
            }

            sendLocalTypingState(true);
            scheduleLocalTypingStop();
        }

        function onTypingEvent(event) {
            if (!event || event.sender_role === 'visitor') {
                return;
            }

            if (event.typing) {
                showTypingIndicator(event.sender_name || 'Admin');
                scheduleRemoteTypingClear();
            } else {
                clearRemoteTypingTimer();
                hideTypingIndicator();
            }
        }

        function onRealtimeMessage(event) {
            const message = event && event.message ? event.message : event;
            if (!message) return;

            if (appendMessage(message, true)) {
                clearRemoteTypingTimer();
                hideTypingIndicator();
                if (message.sender_type !== 'visitor' && conversationId) {
                    NChat.Visitor.markConversationRead(conversationId).catch(() => {});
                    messageCount++;
                    checkSavePopup();
                }
                scrollToBottom();
            }
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isSending) return;

            isSending = true;
            messageInput.value = '';
            welcomeCard.style.display = 'none';
            stopLocalTyping();

            const clientId = nextClientId();
            const pendingGroup = createPendingMessage(clientId, text);
            scrollToBottom();

            try {
                const result = await NChat.Visitor.sendMessage(text, null, clientId);
                if (result.message) {
                    resolvePendingMessage({
                        ...result.message,
                        client_id: result.message.client_id || result.client_id,
                    });
                }
                messageCount++;
                checkSavePopup();
            } catch (err) {
                pendingMessages.delete(clientId);
                const ts = pendingGroup.querySelector('.timestamp');
                if (ts) {
                    ts.textContent = 'failed';
                }
                console.error('Send error:', err);
            } finally {
                isSending = false;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        messageInput.addEventListener('input', handleTypingInput);
        messageInput.addEventListener('blur', stopLocalTyping);

        // ── Append Message to DOM (returns true if actually added) ──
        function appendMessage(msg, animate) {
            if (resolvePendingMessage(msg)) return true;

            // Dedup: skip if this real ID was already rendered
            if (renderedIds.has(msg.id)) return false;
            renderedIds.add(msg.id);

            const isMine = msg.sender_type === 'visitor';
            const isAssistant = NChat.isAssistantMessage(msg);
            const group = document.createElement('div');
            group.className = `msg-group msg-group--${isMine ? 'sent' : 'received'}`;
            group.dataset.id = String(msg.id);
            group.dataset.senderType = msg.sender_type;
            if (!animate) group.style.animation = 'none';

            const label = createMessageLabel(msg.sender_type);
            const bubble = document.createElement('div');
            bubble.className = `bubble bubble--${isMine ? 'sent' : (isAssistant ? 'assistant' : 'received')}`;
            if (isAssistant) {
                bubble.innerHTML = NChat.safeAssistantHtml(msg.body);
            } else {
                bubble.textContent = msg.body;
            }

            const ts = document.createElement('span');
            ts.className = 'timestamp';
            ts.textContent = msg.time || '';

            if (label) {
                group.appendChild(label);
            }
            group.appendChild(bubble);
            group.appendChild(ts);
            syncMessageMeta(group, msg, isMine);
            chatCanvas.insertBefore(group, typingIndicator);
            return true;
        }

        function addDayDivider(label) {
            const div = document.createElement('div');
            div.className = 'day-divider';
            div.innerHTML = `<span>${label}</span>`;
            chatCanvas.insertBefore(div, typingIndicator);
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                chatCanvas.scrollTop = chatCanvas.scrollHeight;
                window.scrollTo(0, document.body.scrollHeight);
            });
        }

        // ── Save Chat Popup Logic ──
        function checkSavePopup() {
            if (hasShownPopup) return;
            if (visitorInfo && visitorInfo.is_logged_in) return;
            if (messageCount >= 2) {
                hasShownPopup = true;
                setTimeout(() => {
                    savePopup.classList.add('show');
                    adjustCanvasPadding();
                }, 500);
            }
        }

        document.getElementById('closePopup').addEventListener('click', () => {
            savePopup.classList.remove('show');
            adjustCanvasPadding();
        });

        function adjustCanvasPadding() {
            const popupVisible = savePopup.classList.contains('show');
            chatCanvas.style.paddingBottom = popupVisible ? '10rem' : '5rem';
        }

        // ── Boot ──
        adjustCanvasPadding();
        window.addEventListener('beforeunload', () => {
            stopLocalTyping();
            clearRemoteTypingTimer();
            NChat.Visitor.disconnectRealtime();
        });
        window.setInterval(refreshMessageMeta, 30000);
        init();
    </script>
</body>
</html>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary": "#fff7fa",
              "on-tertiary-fixed-variant": "#81013e",
              "secondary-dim": "#7e318e",
              "error-container": "#f76a80",
              "on-background": "#45274b",
              "surface-container-lowest": "#ffffff",
              "primary-fixed-dim": "#ec91ff",
              "on-tertiary-fixed": "#480020",
              "on-primary-container": "#680082",
              "surface-container-high": "#fedeff",
              "surface": "#fff7fb",
              "secondary-fixed": "#fed6ff",
              "surface-container-highest": "#fdd6ff",
              "secondary": "#8c3e9b",
              "on-error-container": "#68001f",
              "on-surface": "#45274b",
              "on-secondary-container": "#7d308d",
              "tertiary": "#ac2d5e",
              "secondary-fixed-dim": "#fbc2ff",
              "surface-container": "#ffe6fe",
              "tertiary-container": "#ff9bb7",
              "surface-bright": "#fff7fb",
              "inverse-primary": "#e67aff",
              "primary-container": "#f1a6ff",
              "on-secondary-fixed": "#681978",
              "outline-variant": "#cca5d0",
              "surface-variant": "#fdd6ff",
              "on-primary": "#fff7fb",
              "on-secondary-fixed-variant": "#883a97",
              "background": "#fff7fb",
              "primary-dim": "#871ba4",
              "surface-tint": "#952cb1",
              "outline": "#926f97",
              "on-primary-fixed-variant": "#760093",
              "surface-container-low": "#ffeffc",
              "on-tertiary-container": "#710035",
              "inverse-on-surface": "#ad96ae",
              "error": "#ac3149",
              "on-tertiary": "#fff7f7",
              "primary": "#952cb1",
              "tertiary-fixed-dim": "#ff84aa",
              "secondary-container": "#fed6ff",
              "tertiary-fixed": "#ff9bb7",
              "primary-fixed": "#f1a6ff",
              "on-surface-variant": "#75547a",
              "inverse-surface": "#17081a",
              "error-dim": "#770326",
              "on-error": "#fff7f7",
              "surface-dim": "#f9cbfd",
              "on-primary-fixed": "#47005a",
              "tertiary-dim": "#9c1f52"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            backdrop-filter: blur(16px);
            background: rgba(255, 247, 251, 0.7);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fff7fb]/80 backdrop-blur-md flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#952cb1] text-2xl" data-icon="bubble_chart">bubble_chart</span>
<span class="text-2xl font-black tracking-tighter text-[#952cb1]">n-chat</span>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#75547a] hover:bg-[#fedeff]/50 transition-colors px-4 py-2 rounded-full" href="#">Login</a>
<a class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#952cb1] hover:bg-[#fedeff]/50 transition-colors px-4 py-2 rounded-full" href="#">Signup</a>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-32">
<div class="w-full max-w-md space-y-12">
<!-- Hero Heading -->
<div class="space-y-4 text-center md:text-left">
<h1 class="text-[2.75rem] font-extrabold leading-tight tracking-tight text-on-background">
                    Start something <span class="text-primary italic">new.</span>
</h1>
<p class="text-on-surface-variant font-medium">Join the digital pulse and connect beautifully.</p>
</div>
<!-- Signup Form -->
<form class="space-y-6">
<div class="space-y-5">
<!-- Full Name Field -->
<div class="group">
<label class="block text-[0.6875rem] font-medium tracking-wide text-on-surface-variant mb-2 ml-4">Full Name</label>
<div class="relative">
<input class="w-full px-6 py-4 bg-surface-container-high border-none rounded-full text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all" placeholder="Alex Rivera" type="text"/>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
</div>
</div>
<!-- Email Field -->
<div class="group">
<label class="block text-[0.6875rem] font-medium tracking-wide text-on-surface-variant mb-2 ml-4">Email Address</label>
<div class="relative">
<input class="w-full px-6 py-4 bg-surface-container-high border-none rounded-full text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all" placeholder="alex@n-chat.io" type="email"/>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block text-[0.6875rem] font-medium tracking-wide text-on-surface-variant mb-2 ml-4">Password</label>
<div class="relative">
<input class="w-full px-6 py-4 bg-surface-container-high border-none rounded-full text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-full shadow-[0_10px_30px_rgba(149,44,177,0.2)] hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        Sign Up
                        <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Link -->
<div class="text-center">
<p class="text-on-surface-variant font-medium">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Log in</a>
</p>
</div>
</div>
</main>
<!-- Visual Accent Element (Decorative) -->
<div class="fixed top-1/4 -right-20 w-80 h-80 bg-primary-container/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-1/4 -left-20 w-64 h-64 bg-secondary-container/30 rounded-full blur-[80px] pointer-events-none"></div>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-8 pb-6 pt-3 bg-[#fff7fb] z-50 rounded-t-[2.5rem] shadow-[0_-4px_40px_rgba(69,39,75,0.04)]">
<a class="flex flex-col items-center justify-center text-[#75547a] px-6 py-2 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined mb-1" data-icon="login">login</span>
<span class="font-['Plus_Jakarta_Sans'] text-[0.6875rem] font-medium tracking-wide">Login</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#fed6ff] text-[#952cb1] rounded-full px-6 py-2 scale-98 active:duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person_add" style="font-variation-settings: 'FILL' 1;">person_add</span>
<span class="font-['Plus_Jakarta_Sans'] text-[0.6875rem] font-medium tracking-wide">Signup</span>
</a>
</nav>
</body></html>
